<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Handleliste</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    background: #faf9f6;
    color: #333;
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    padding-bottom: 90px;
  }

  .header {
    background: linear-gradient(135deg, #2d5016 0%, #4a7c59 100%);
    padding: 28px 20px 0;
    border-radius: 0 0 24px 24px;
    color: #fff;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 4px 20px rgba(45,80,22,0.25);
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .header .sub { font-size: 13px; opacity: 0.85; font-weight: 600; margin-top: 4px; }
  .btn-header {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff; border-radius: 12px;
    padding: 8px 12px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .header-actions { display: flex; gap: 6px; }

  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }
  .sync-dot.connected { background: #a8e063; }
  .sync-dot.disconnected { background: #ff6b6b; animation: pulse 1.5s infinite; }

  .progress-track {
    margin-top: 14px; height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: #a8e063; border-radius: 3px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  .tabs { display: flex; margin-top: 16px; }
  .tab {
    flex: 1; text-align: center;
    padding: 10px 0 12px;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    color: rgba(255,255,255,0.5);
    border: none; border-bottom: 3px solid transparent;
    background: none; font-family: inherit;
    transition: all 0.2s;
  }
  .tab.active { color: #fff; border-bottom-color: #a8e063; }

  .view { display: none; }
  .view.active { display: block; }

  .list { padding: 12px 16px; }
  .category { margin-bottom: 16px; transition: opacity 0.3s; }
  .category.all-checked { opacity: 0.5; }
  .cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 0 4px; }
  .cat-icon { font-size: 18px; }
  .cat-name { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
  .cat-count { font-size: 11px; font-weight: 700; border-radius: 8px; padding: 2px 8px; }

  .cat-items {
    background: #fff; border-radius: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    overflow: hidden; border: 1px solid #eee;
  }

  .item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid #f0eeeb;
  }
  .item:last-child { border-bottom: none; }
  .item:active { background: #f8f7f4; }

  .checkbox {
    width: 26px; height: 26px; border-radius: 8px;
    border: 2px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .item.checked .checkbox { border-color: var(--cat-color); background: var(--cat-color); }
  .checkbox svg { display: none; }
  .item.checked .checkbox svg { display: block; }

  .item-name { font-size: 16px; font-weight: 600; transition: all 0.2s; flex: 1; }
  .item.checked .item-name { color: #aaa; text-decoration: line-through; }

  .item-delete {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; color: #ccc; font-size: 18px;
    flex-shrink: 0; transition: color 0.15s;
  }
  .item-delete:active { color: #e55; }

  .done-msg {
    text-align: center; padding: 24px 20px;
    font-size: 20px; font-weight: 800; color: #4a7c59; display: none;
  }
  .done-msg.show { display: block; }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: rgba(250,249,246,0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid #e8e6e1; z-index: 20;
  }
  .btn-add-main {
    width: 100%; padding: 14px;
    background: #4a7c59; color: #fff; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 14px rgba(74,124,89,0.3);
  }
  .add-row { display: none; gap: 8px; }
  .add-row.show { display: flex; }
  .add-row input {
    flex: 1; padding: 12px 16px;
    font-size: 16px; font-family: inherit; font-weight: 600;
    border: 2px solid #4a7c59; border-radius: 14px;
    outline: none; background: #fff; color: #333; min-width: 0;
  }
  .add-row .btn-confirm {
    background: #4a7c59; color: #fff; border: none; border-radius: 14px;
    padding: 12px 20px; font-size: 20px; font-weight: 800;
    cursor: pointer; font-family: inherit;
  }
  .add-row .btn-cancel {
    background: #eee; color: #888; border: none; border-radius: 14px;
    padding: 12px 16px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .cat-select { display: none; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .cat-select.show { display: flex; }
  .cat-chip {
    padding: 6px 12px; border-radius: 10px;
    font-size: 12px; font-weight: 700;
    border: 2px solid #ddd; background: #fff;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .cat-chip.active { border-color: #4a7c59; background: #4a7c5915; color: #4a7c59; }

  /* ── Dinners ── */
  .dinner-header-info {
    padding: 16px 20px 4px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }
  .week-title { font-size: 18px; font-weight: 800; color: #2d5016; letter-spacing: -0.3px; }

  .verify-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 12px;
    font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit; border: none; transition: all 0.25s;
  }
  .verify-btn.unverified { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
  .verify-btn.verified { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
  .verify-dot { width: 8px; height: 8px; border-radius: 50%; }
  .unverified .verify-dot { background: #e65100; animation: pulse 1.5s infinite; }
  .verified .verify-dot { background: #2e7d32; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .verify-timestamp {
    text-align: center; padding: 4px 20px 8px;
    font-size: 12px; color: #999; font-weight: 600;
  }

  .days-list { padding: 8px 16px 16px; }

  .day-card {
    background: #fff; border-radius: 16px;
    margin-bottom: 10px; border: 1px solid #eee;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05); overflow: hidden;
  }
  .day-card.today { border-color: #4a7c59; border-width: 2px; }

  .day-row {
    display: flex; align-items: center;
    padding: 14px 16px; gap: 12px; cursor: pointer;
  }
  .day-row:active { background: #faf9f6; }

  .day-label {
    font-size: 13px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.5px;
    width: 32px; flex-shrink: 0;
  }
  .day-card.today .day-label { color: #4a7c59; }
  .today-badge {
    font-size: 10px; font-weight: 800; color: #fff;
    background: #4a7c59; border-radius: 6px;
    padding: 2px 7px; margin-left: -4px;
  }

  .day-meal { flex: 1; font-size: 16px; font-weight: 600; color: #333; min-width: 0; }
  .day-meal.empty { color: #bbb; font-style: italic; font-weight: 400; }
  .day-edit-icon { color: #ccc; font-size: 16px; flex-shrink: 0; }

  .day-edit { display: none; padding: 0 16px 14px; gap: 8px; }
  .day-edit.show { display: flex; }
  .day-edit input {
    flex: 1; padding: 10px 14px;
    font-size: 15px; font-family: inherit; font-weight: 600;
    border: 2px solid #4a7c59; border-radius: 12px;
    outline: none; background: #fff; color: #333; min-width: 0;
  }
  .day-edit .btn-save {
    background: #4a7c59; color: #fff; border: none; border-radius: 12px;
    padding: 10px 16px; font-size: 14px; font-weight: 800;
    cursor: pointer; font-family: inherit;
  }
  .day-edit .btn-del {
    background: #fce4ec; color: #c62828; border: none; border-radius: 12px;
    padding: 10px 14px; font-size: 14px;
    cursor: pointer; font-family: inherit;
  }

  /* ── Share modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 100;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 20px;
    padding: 28px 24px; width: 100%; max-width: 360px;
    text-align: center;
  }
  .modal h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: #2d5016; }
  .modal p { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5; }
  .modal .share-url {
    background: #f5f4f0; border: 2px solid #e0ddd6; border-radius: 12px;
    padding: 12px 16px; font-size: 13px; font-weight: 600;
    word-break: break-all; color: #333; margin-bottom: 16px;
    text-align: left; line-height: 1.4;
  }
  .modal .btn-copy {
    width: 100%; padding: 14px;
    background: #4a7c59; color: #fff; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit;
    margin-bottom: 10px;
  }
  .modal .btn-close {
    width: 100%; padding: 12px;
    background: #eee; color: #888; border: none; border-radius: 14px;
    font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
  }

  /* ── Loading ── */
  .loading-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #e0ddd6; border-top-color: #4a7c59;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 16px; font-weight: 700; color: #999; }
</style>
</head>
<body>

<div class="header">
  <div id="headerContent"></div>
  <div class="tabs">
    <button class="tab active" data-tab="liste" onclick="switchTab('liste')">🛒 Handleliste</button>
    <button class="tab" data-tab="middager" onclick="switchTab('middager')">🍽️ Middager</button>
  </div>
</div>

<div class="view active" id="view-liste">
  <div class="list" id="list">
    <div class="loading-screen"><div class="spinner"></div><div class="loading-text">Kobler til...</div></div>
  </div>
  <div class="done-msg" id="doneMsg">✅ Alt hentet! God middag!</div>
</div>

<div class="view" id="view-middager">
  <div class="dinner-header-info">
    <div class="week-title" id="weekTitle"></div>
    <button class="verify-btn unverified" id="verifyBtn" onclick="toggleVerify()">
      <span class="verify-dot"></span>
      <span id="verifyLabel">Ikke bekreftet</span>
    </button>
  </div>
  <div id="verifyTimestamp" class="verify-timestamp" style="display:none"></div>
  <div class="days-list" id="daysList"></div>
</div>

<div class="bottom-bar" id="bottomBar">
  <button class="btn-add-main" id="btnAddMain" onclick="showAddUI()">+ Legg til produkt</button>
  <div class="add-row" id="addRow">
    <input type="text" id="addInput" placeholder="Legg til produkt..." onkeydown="if(event.key==='Enter')addItem()">
    <button class="btn-confirm" onclick="addItem()">+</button>
    <button class="btn-cancel" onclick="hideAddUI()">✕</button>
  </div>
  <div class="cat-select" id="catSelect"></div>
</div>

<div class="modal-overlay" id="shareModal">
  <div class="modal">
    <h2>📲 Del handlelisten</h2>
    <p>Send denne lenken til noen du vil dele listen med. Alle med lenken kan se og redigere.</p>
    <div class="share-url" id="shareUrl"></div>
    <button class="btn-copy" id="btnCopy" onclick="copyShareUrl()">📋 Kopier lenke</button>
    <button class="btn-close" onclick="closeShareModal()">Lukk</button>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* ══════════════════════════════════
   FIREBASE SETUP
   ══════════════════════════════════ */
const FIREBASE_URL = "https://handlelistehogo-default-rtdb.europe-west1.firebasedatabase.app";

firebase.initializeApp({ databaseURL: FIREBASE_URL });
const db = firebase.database();

let listId = null;
let isConnected = false;
let itemsRef = null;
let dinnersRef = null;

function generateId() {
  const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
  let id = "";
  for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

function initList() {
  // Check URL params for shared list
  const params = new URLSearchParams(window.location.search);
  const sharedId = params.get("list");

  if (sharedId) {
    listId = sharedId;
    localStorage.setItem("handleliste_listId", listId);
  } else {
    listId = localStorage.getItem("handleliste_listId");
    if (!listId) {
      listId = generateId();
      localStorage.setItem("handleliste_listId", listId);
      // Push default items on first create
      seedDefaultItems();
    }
  }

  // Set up refs
  itemsRef = db.ref(`lists/${listId}/items`);
  dinnersRef = db.ref(`lists/${listId}/dinners`);

  // Listen for connection state
  db.ref(".info/connected").on("value", (snap) => {
    isConnected = snap.val() === true;
    renderHeader();
  });

  // Listen for items changes
  itemsRef.on("value", (snap) => {
    const data = snap.val();
    items = data ? Object.entries(data).map(([fbKey, val]) => ({ ...val, fbKey })) : [];
    renderList();
  });

  // Listen for dinners changes
  dinnersRef.on("value", (snap) => {
    dinnerData = snap.val() || { meals: {}, verified: null, verifiedWeek: null };
    if (currentTab === "middager") renderDinners();
  });
}

function seedDefaultItems() {
  const defaults = [
    { id: 1, name: "400g kjøttdeig", cat: "kjott", checked: false },
    { id: 2, name: "600g kylling lårfilet", cat: "kjott", checked: false },
    { id: 3, name: "Servelat", cat: "kjott", checked: false },
    { id: 4, name: "3x YT vanilje", cat: "meieri", checked: false },
    { id: 5, name: "Cottage cheese", cat: "meieri", checked: false },
    { id: 6, name: "Melk", cat: "meieri", checked: false },
    { id: 7, name: "Smør", cat: "meieri", checked: false },
    { id: 8, name: "Crème fraîche", cat: "meieri", checked: false },
    { id: 9, name: "Ost", cat: "meieri", checked: false },
    { id: 10, name: "Egg", cat: "meieri", checked: false },
    { id: 11, name: "Brød", cat: "bakeri", checked: false },
    { id: 12, name: "Paprika", cat: "frukt", checked: false },
    { id: 13, name: "Tomat", cat: "frukt", checked: false },
    { id: 14, name: "Agurk", cat: "frukt", checked: false },
    { id: 15, name: "Purre", cat: "frukt", checked: false },
    { id: 16, name: "Gulrot", cat: "frukt", checked: false },
    { id: 17, name: "Kinakål", cat: "frukt", checked: false },
    { id: 18, name: "Avocado", cat: "frukt", checked: false },
    { id: 19, name: "Curry paste", cat: "torr", checked: false },
    { id: 20, name: "Taco krydder", cat: "torr", checked: false },
    { id: 21, name: "Wok mix", cat: "torr", checked: false },
    { id: 22, name: "Nachos", cat: "torr", checked: false },
    { id: 23, name: "Taco saus", cat: "torr", checked: false },
  ];
  const ref = db.ref(`lists/${listId}/items`);
  defaults.forEach((item) => ref.push(item));
}

/* ══════════════════════════════════
   SHARING
   ══════════════════════════════════ */
function getShareUrl() {
  const base = window.location.origin + window.location.pathname;
  return `${base}?list=${listId}`;
}

function openShareModal() {
  document.getElementById("shareUrl").textContent = getShareUrl();
  document.getElementById("btnCopy").textContent = "📋 Kopier lenke";
  document.getElementById("shareModal").classList.add("show");
}

function closeShareModal() {
  document.getElementById("shareModal").classList.remove("show");
}

function copyShareUrl() {
  const url = getShareUrl();
  if (navigator.share) {
    navigator.share({ title: "Handleliste", url }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      document.getElementById("btnCopy").textContent = "✅ Kopiert!";
      setTimeout(() => {
        document.getElementById("btnCopy").textContent = "📋 Kopier lenke";
      }, 2000);
    });
  }
}

/* ══════════════════════════════════
   SHARED UI
   ══════════════════════════════════ */
let currentTab = "liste";

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(`view-${tab}`).classList.add("active");
  document.getElementById("bottomBar").style.display = tab === "liste" ? "" : "none";
  hideAddUI();
  renderHeader();
  if (tab === "middager") renderDinners();
}

function renderHeader() {
  const el = document.getElementById("headerContent");
  const dot = `<span class="sync-dot ${isConnected ? 'connected' : 'disconnected'}"></span>`;

  if (currentTab === "liste") {
    const total = items.length;
    const checked = items.filter(i => i.checked).length;
    el.innerHTML = `<div class="header-row">
      <div>
        <h1>${dot}🛒 Handleliste</h1>
        <div class="sub">${checked} av ${total} hentet</div>
      </div>
      <div class="header-actions">
        ${checked > 0 ? '<button class="btn-header" onclick="removeChecked()">Fjern ✓</button>' : ''}
        <button class="btn-header" onclick="openShareModal()">📲 Del</button>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${total > 0 ? (checked/total)*100 : 0}%"></div></div>`;
  } else {
    el.innerHTML = `<div class="header-row">
      <div><h1>${dot}🍽️ Ukesplan</h1><div class="sub">Planlegg middagene for uken</div></div>
      <button class="btn-header" onclick="openShareModal()">📲 Del</button>
    </div>`;
  }
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

/* ══════════════════════════════════
   SHOPPING LIST
   ══════════════════════════════════ */
const CATEGORIES = [
  { key: "frukt", name: "Frukt & grønt", icon: "🥬", color: "#4a7c59" },
  { key: "kjott", name: "Kjøtt", icon: "🥩", color: "#a0522d" },
  { key: "meieri", name: "Meieri", icon: "🧀", color: "#5b7fa5" },
  { key: "bakeri", name: "Bakeri", icon: "🍞", color: "#c49a3c" },
  { key: "torr", name: "Tørrvarer", icon: "🫙", color: "#8b6b8b" },
];

let items = [];
let selectedCat = "torr";

function renderList() {
  const list = document.getElementById("list");
  const total = items.length;
  const checked = items.filter(i => i.checked).length;
  document.getElementById("doneMsg").classList.toggle("show", checked === total && total > 0);
  renderHeader();

  let html = "";
  for (const cat of CATEGORIES) {
    const ci = items.filter(i => i.cat === cat.key);
    if (!ci.length) continue;
    const allDone = ci.every(i => i.checked);
    const left = ci.filter(i => !i.checked).length;
    html += `<div class="category${allDone ? " all-checked" : ""}">
      <div class="cat-header">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-name" style="color:${cat.color}">${cat.name}</span>
        <span class="cat-count" style="background:${cat.color}18;color:${cat.color}">${left}</span>
      </div><div class="cat-items">`;
    for (const item of ci) {
      html += `<div class="item${item.checked ? " checked" : ""}" style="--cat-color:${cat.color}" onclick="toggle('${item.fbKey}')">
        <div class="checkbox"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7.5L5.5 10L11 4" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="item-name">${esc(item.name)}</span>
        <div class="item-delete" onclick="event.stopPropagation();removeItem('${item.fbKey}')">×</div>
      </div>`;
    }
    html += `</div></div>`;
  }

  if (!items.length && isConnected) {
    html = `<div style="text-align:center;padding:60px 20px;color:#999;">
      <div style="font-size:48px;margin-bottom:12px;">🛒</div>
      <div style="font-size:16px;font-weight:700;">Listen er tom</div>
      <div style="font-size:14px;margin-top:4px;">Legg til produkter med knappen under</div>
    </div>`;
  }

  list.innerHTML = html;
}

function toggle(fbKey) {
  const item = items.find(i => i.fbKey === fbKey);
  if (item) {
    itemsRef.child(fbKey).update({ checked: !item.checked });
  }
}

function removeItem(fbKey) {
  itemsRef.child(fbKey).remove();
}

function removeChecked() {
  const checkedItems = items.filter(i => i.checked);
  const updates = {};
  checkedItems.forEach(i => { updates[i.fbKey] = null; });
  itemsRef.update(updates);
}

function showAddUI() {
  document.getElementById("btnAddMain").style.display = "none";
  document.getElementById("addRow").classList.add("show");
  document.getElementById("catSelect").classList.add("show");
  renderCatChips();
  document.getElementById("addInput").focus();
}

function hideAddUI() {
  document.getElementById("btnAddMain").style.display = "";
  document.getElementById("addRow").classList.remove("show");
  document.getElementById("catSelect").classList.remove("show");
  document.getElementById("addInput").value = "";
}

function renderCatChips() {
  document.getElementById("catSelect").innerHTML = CATEGORIES.map(c =>
    `<button class="cat-chip${c.key === selectedCat ? " active" : ""}" onclick="selectedCat='${c.key}';renderCatChips()">${c.icon} ${c.name}</button>`
  ).join("");
}

function addItem() {
  const input = document.getElementById("addInput");
  const name = input.value.trim();
  if (!name) return;
  itemsRef.push({ id: Date.now(), name, cat: selectedCat, checked: false });
  input.value = "";
  input.focus();
}

/* ══════════════════════════════════
   DINNERS
   ══════════════════════════════════ */
const DAYS = [
  { key: "mon", label: "Man", full: "Mandag" },
  { key: "tue", label: "Tir", full: "Tirsdag" },
  { key: "wed", label: "Ons", full: "Onsdag" },
  { key: "thu", label: "Tor", full: "Torsdag" },
  { key: "fri", label: "Fre", full: "Fredag" },
  { key: "sat", label: "Lør", full: "Lørdag" },
  { key: "sun", label: "Søn", full: "Søndag" },
];
const DAY_COLORS = ["#4a7c59","#a0522d","#5b7fa5","#8b6b8b","#c49a3c","#3a7ca5","#7c5a4a"];

let dinnerData = { meals: {}, verified: null, verifiedWeek: null };
let editingDay = null;

function getWeekNumber() {
  const d = new Date();
  const target = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = target.getUTCDay() || 7;
  target.setUTCDate(target.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(target.getUTCFullYear(), 0, 1));
  return Math.ceil((((target - yearStart) / 86400000) + 1) / 7);
}

function getTodayIdx() { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; }

function isVerified() { return dinnerData.verifiedWeek === getWeekNumber() && dinnerData.verified; }

function toggleVerify() {
  if (isVerified()) {
    dinnerData.verified = null;
    dinnerData.verifiedWeek = null;
  } else {
    dinnerData.verified = new Date().toISOString();
    dinnerData.verifiedWeek = getWeekNumber();
  }
  dinnersRef.set(dinnerData);
}

function renderDinners() {
  const week = getWeekNumber();
  document.getElementById("weekTitle").textContent = `Ukesmiddager — UKE ${week}`;

  const btn = document.getElementById("verifyBtn");
  const label = document.getElementById("verifyLabel");
  const ts = document.getElementById("verifyTimestamp");
  const v = isVerified();

  btn.className = `verify-btn ${v ? "verified" : "unverified"}`;
  label.textContent = v ? "Bekreftet ✓" : "Ikke bekreftet";

  if (v && dinnerData.verified) {
    const dt = new Date(dinnerData.verified);
    ts.textContent = `Bekreftet ${dt.toLocaleDateString("no-NO", { weekday: "long", day: "numeric", month: "long" })} kl. ${dt.toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" })}`;
    ts.style.display = "";
  } else {
    ts.style.display = "none";
  }

  const todayIdx = getTodayIdx();
  const meals = dinnerData.meals || {};
  const el = document.getElementById("daysList");

  el.innerHTML = DAYS.map((day, i) => {
    const meal = meals[day.key] || "";
    const isToday = i === todayIdx;
    const editing = editingDay === day.key;

    return `<div class="day-card${isToday ? " today" : ""}">
      <div class="day-row" onclick="startEdit('${day.key}')">
        <div class="day-label" style="color:${DAY_COLORS[i]}">${day.label}</div>
        ${isToday ? '<span class="today-badge">I DAG</span>' : ''}
        <div class="day-meal${meal ? '' : ' empty'}">${meal ? esc(meal) : 'Trykk for å legge til...'}</div>
        <div class="day-edit-icon">✎</div>
      </div>
      <div class="day-edit${editing ? ' show' : ''}" id="edit-${day.key}">
        <input type="text" value="${esc(meal)}" placeholder="${day.full}s middag..."
          id="input-${day.key}" onkeydown="if(event.key==='Enter')saveMeal('${day.key}')">
        <button class="btn-save" onclick="saveMeal('${day.key}')">OK</button>
        ${meal ? `<button class="btn-del" onclick="deleteMeal('${day.key}')">🗑</button>` : ''}
      </div>
    </div>`;
  }).join("");

  if (editingDay) {
    const inp = document.getElementById(`input-${editingDay}`);
    if (inp) { inp.focus(); inp.selectionStart = inp.value.length; }
  }
}

function startEdit(key) { editingDay = editingDay === key ? null : key; renderDinners(); }

function saveMeal(key) {
  const val = document.getElementById(`input-${key}`).value.trim();
  if (!dinnerData.meals) dinnerData.meals = {};
  if (val) dinnerData.meals[key] = val;
  else delete dinnerData.meals[key];
  dinnerData.verified = null;
  dinnerData.verifiedWeek = null;
  editingDay = null;
  dinnersRef.set(dinnerData);
}

function deleteMeal(key) {
  if (dinnerData.meals) delete dinnerData.meals[key];
  dinnerData.verified = null;
  dinnerData.verifiedWeek = null;
  editingDay = null;
  dinnersRef.set(dinnerData);
}

/* ══════════════════════════════════
   INIT
   ══════════════════════════════════ */
initList();
</script>
